# conda-lock.yml — Reproducible conda environment for MagNozzleX
# Generated for: macOS (Apple Silicon, arm64) and Linux (x86_64)
#
# To create the environment:
#   conda install -n base -c conda-forge conda-lock
#   conda-lock install --name magnozzlex conda-lock.yml
#
# To regenerate from environment.yml:
#   conda-lock lock --file environment.yml --platform linux-64 --platform osx-arm64
#
# NOTE: This file pins core scientific dependencies for reproducibility.
# MLX is Apple Silicon only and must be installed via pip after conda setup.
# WarpX must be installed separately (see docs/guide/install.md).

