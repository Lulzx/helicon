[project]
name = "magnozzlex"
version = "0.1.0"
description = "GPU-Accelerated Magnetic Nozzle Simulation & Detachment Analysis Toolkit"
license = "MIT"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.24",
    "scipy>=1.10",
]

[project.optional-dependencies]
mlx = ["mlx>=0.10"]
hdf5 = ["h5py>=3.8"]
dev = ["pytest>=7.0", "h5py>=3.8"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
target-version = "py311"
line-length = 95

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "RUF"]
ignore = ["E741"]  # allow I for current (physics convention)

[tool.ty.environment]
python-version = "3.11"
